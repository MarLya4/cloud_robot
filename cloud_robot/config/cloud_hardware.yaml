
controller_manager:
  ros__parameters:
    update_rate: 80

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    servo_controller:
      type: forward_command_controller/ForwardCommandController



diff_drive_controller:
  ros__parameters:

    left_wheel_names: ["Left_Front_Wheel_1, Left_Rear_Wheel_1"]
    right_wheel_names: ["Right_Front_Wheel_1,Right_Rear_Wheel_1"]

    wheel_separation: 0.121
    wheel_radius: 0.05
    
    use_stamped_vel: false
    open loop: false

servo_controller:
  ros__parameters:

    joints:
      - Left_Front_Fliper_1
      - Right_Front_Fliper_1
      - Left_Rear_Fliper_1
      - Right_Rear_Wheel_1
      - Joint_1_1
      - Joint_Bridge_1_1
      - Joint_Bridge_2_1
      - Joint_2_1
      - Joint_3_1
      - Joint_4_1
      - Joint_5_1
    
